{% extends "app/base.html" %}
{% load static %}
{% load humanize %}
<html>
    <head>
        <meta charset="utf-8">
        <meta http-equiv="X-UA-Compatible" content="IE=edge">
        <title></title>
        <meta name="description" content="">
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <link rel="stylesheet" href="">
    </head>
    <body>
        {% block search %}
        <h5>Result search for {{searched}}</h5>
        <div class = "row" style = "width:100%">
            {%for product in keys %}
            <div class="col-lg-4">
                <div class="card h-100 shadow-sm">
                    <img src="{{product.ImageUrl}}" 
                        class="card-img-top" 
                        style="height:200px; object-fit:cover;">
                    <div class="card-body">
                        <h6 class="card-title fw-bold mb-2">{{product.name}}</h6>
                        <div class="d-flex justify-content-between align-items-center">
                            <div class="d-flex align-items-center gap-2">
                                <button data-product = {{product.id}} data-action = "add" class="btn btn-outline-primary btn-sm add-cart update-cart">
                                    🛒 Thêm vào giỏ hàng
                                </button>

                                <a class="btn btn-sm view-btn" href="#">
                                    Xem
                                </a>
                            </div>
                            <span class="text-danger fw-bold">
                                💵 {{product.price|intcomma}}VNĐ
                            </span>
                        </div>
                    </div>
                </div>
            </div>
            {% endfor %}
        </div>
        {% endblock search %}
    </body>
</html>
