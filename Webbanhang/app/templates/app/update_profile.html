{% extends "app/base.html" %}
{% load static %}
{% load humanize %}
<html>
    <head>
        <meta charset="utf-8">
        <meta http-equiv="X-UA-Compatible" content="IE=edge">
        <title></title>
        <meta name="description" content="">
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <link rel="stylesheet" href="">
    </head>
    <body>
        {% block profile %}
        <section style="background-color: #eee;">
            <div class="container py-5">
                <div class="row">
                    <div class="col-lg-4">
                        <div class="card mb-4">
                            <div class="card-body text-center">
                                <img src="{{ user.profile.avatar.url }}" class= "avatar-profile">
                                <form method="POST" enctype="multipart/form-data">
                                    {% csrf_token %}
                                    <!-- Nút chọn file -->
                                    <label class="btn-upload">
                                        Tải ảnh lên
                                        <input type="file" name="avatar">
                                    </label>
                                    <!-- Nút submit -->
                                    <button type="submit" class="btn-submit">Cập nhật ảnh</button>
                                </form>
                                <h5 class="my-3 name">{{user.username}}</h5>
                                <div class="d-flex justify-content-center mb-2">
                                    <a href="{% url "profile" %}" class="back-btn">
                                        <i class="fa-solid fa-chevron-left"></i>
                                        <span>Back</span>
                                    </a>
                                </div>
                            </div>
                        </div>
                        <div class="card mb-4 mb-lg-0">
                            <div class="card-body p-0">
                                <ul class="list-group list-group-flush rounded-3">
                                    <li class="list-group-item d-flex justify-content-between align-items-center p-3">
                                        <i class="fab fa-github fa-lg text-body"></i>
                                        <p class="mb-0">mdbootstrap</p>
                                    </li>
                                    <li class="list-group-item d-flex justify-content-between align-items-center p-3">
                                        <i class="fab fa-instagram fa-lg" style="color: #ac2bac;"></i>
                                        <p class="mb-0">mdbootstrap</p>
                                    </li>
                                    <li class="list-group-item d-flex justify-content-between align-items-center p-3">
                                        <i class="fab fa-facebook-f fa-lg" style="color: #3b5998;"></i>
                                        <p class="mb-0">mdbootstrap</p>
                                    </li>
                                </ul>
                            </div>
                        </div>
                    </div>
                    <div class="col-lg-8">
                        <div class="card shadow-sm">
                            <div class="card-body">

                                <form method="POST">
                                    {% csrf_token %}

                                    <h5 class="mb-4">Chỉnh sửa thông tin</h5>

                                    <!-- Username -->
                                    <div class="form-group mb-3">
                                        <label>User Name</label>
                                        <input type="text" name="username" value="{{ user.username }}" class="form-control">
                                    </div>

                                    <!-- First Name -->
                                    <div class="form-group mb-3">
                                        <label>First Name</label>
                                        <input type="text" name="first_name" value="{{ user.first_name }}" class="form-control">
                                    </div>

                                    <!-- Last Name -->
                                    <div class="form-group mb-3">
                                        <label>Last Name</label>
                                        <input type="text" name="last_name" value="{{ user.last_name }}" class="form-control">
                                    </div>

                                    <!-- Email -->
                                    <div class="form-group mb-3">
                                        <label>Email</label>
                                        <input type="email" name="email" value="{{ user.email }}" class="form-control">
                                    </div>

                                    <!-- Phone -->
                                    <div class="form-group mb-3">
                                        <label>Phone</label>
                                        <input type="text" name="phone" value="{{ user.profile.phone }}" class="form-control">
                                    </div>

                                    <!-- Address -->
                                    <div class="form-group mb-3">
                                        <label>Address</label>
                                        <textarea name="address" class="form-control" rows="2">{{ user.profile.address }}</textarea>
                                    </div>

                                    <!-- BUTTON -->
                                    <div class="d-flex justify-content-end mt-4">
                                        <button type="submit" class="btn-save">
                                            💾 Lưu thay đổi
                                        </button>
                                    </div>
                                </form>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </section>
        {% endblock profile %}
    </body>
</html>
